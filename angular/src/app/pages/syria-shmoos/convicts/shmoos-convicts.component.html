<div>
  <!-- Toolbar Actions -->
  <div class="flex justify-between items-center mb-4">
    <div class="filter-actions flex gap-3 ml-auto">
      <button pButton label="Filter" icon="pi pi-filter" class="p-button-outlined text-gray-700 bg-white border-gray-300 rounded-lg" (click)="toggleFilter()"></button>
    </div>
  </div>

  <!-- Filter Grid -->
  <div *ngIf="showFilter" class="filter-panel bg-white p-4 rounded-lg shadow-sm border border-gray-200 mb-6">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <div class="flex flex-col gap-2">
        <label class="text-sm font-semibold text-gray-600">Guest Name</label>
        <input pInputText type="text" placeholder="Guest Name" class="w-full" [(ngModel)]="filterGuestName" />
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-sm font-semibold text-gray-600">ID Number</label>
        <input pInputText type="text" placeholder="ID Number" class="w-full" [(ngModel)]="filterIdNumber" />
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-sm font-semibold text-gray-600">ID Serial</label>
        <input pInputText type="text" placeholder="ID Serial" class="w-full" [(ngModel)]="filterIdSerial" />
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-sm font-semibold text-gray-600">Address</label>
        <input pInputText type="text" placeholder="Address" class="w-full" [(ngModel)]="filterAddress" />
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-sm font-semibold text-gray-600">Nationality</label>
        <input pInputText type="text" placeholder="Nationality" class="w-full" [(ngModel)]="filterNationality" />
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-sm font-semibold text-gray-600">Date of Birth</label>
        <p-datepicker styleClass="w-full" [iconDisplay]="'input'" [showIcon]="true" inputId="dob-date" [(ngModel)]="filterDateOfBirth"></p-datepicker>
      </div>
        <div class="flex flex-col gap-2">
      </div>

      <div class="flex items-end justify-end gap-2 md:col-start-4">
        <button pButton label="" icon="pi pi-times" class="p-button-outlined border-gray-300 text-gray-500 bg-white px-4" (click)="clearFilters()"></button>
        <button pButton label="Search" icon="pi pi-search" class="p-button-outlined border-gray-300 text-gray-700 bg-white px-6" (click)="onSearch()"></button>
      </div>
    </div>
  </div>

  <!-- Data Table -->
  <p-table
    [value]="convicts"
    [paginator]="true"
    [lazy]="true"
    [rows]="pageSize"
    [totalRecords]="totalRecords"
    [loading]="isLoading"
    (onLazyLoad)="onPageChange($event)"
    [rowsPerPageOptions]="[7, 14, 21]"
    styleClass="p-datatable-sm"
    class="custom-table w-full">

    <ng-template #header>
      <tr>
        <th class="text-xs text-gray-500 font-medium whitespace-nowrap">Guest name</th>
        <th class="text-xs text-gray-500 font-medium whitespace-nowrap">Date of birth</th>
        <th class="text-xs text-gray-500 font-medium whitespace-nowrap">Nationality</th>
        <th class="text-xs text-gray-500 font-medium whitespace-nowrap">ID Number</th>
        <th class="text-xs text-gray-500 font-medium whitespace-nowrap">ID Serial</th>
        <th class="text-xs text-gray-500 font-medium">Address</th>
      </tr>
    </ng-template>
    
    <ng-template #body let-res>
      <tr class="border-b border-gray-100 font-bold text-sm" [ngClass]="{'text-red-500': res.isFlagged, 'text-gray-800': !res.isFlagged}">
        <td class="py-5 whitespace-nowrap" [ngClass]="{'text-red-500': res.isFlagged}">{{ res.guestName }}</td>
        <td class="whitespace-nowrap pt-5" [ngClass]="{'text-red-500': res.isFlagged}">{{ res.dateOfBirth }}</td>
        <td class="whitespace-nowrap pt-5" [ngClass]="{'text-red-500': res.isFlagged}">{{ res.nationality }}</td>
        <td class="whitespace-nowrap pt-5" [ngClass]="{'text-red-500': res.isFlagged}">{{ res.idNumber }}</td>
        <td class="whitespace-nowrap pt-5" [ngClass]="{'text-red-500': res.isFlagged}">{{ res.idSerial }}</td>
        <td class="pt-5" [ngClass]="{'text-red-500': res.isFlagged}">{{ res.address }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
